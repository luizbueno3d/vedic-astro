<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login - Vedic Astro</title>
    <style>
        body { margin:0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background:#141625; color:#f3f4f6; display:flex; min-height:100vh; align-items:center; justify-content:center; }
        .card { width:min(420px, 92vw); background:#1c1f35; border:1px solid #34385c; border-radius:14px; padding:28px; box-shadow:0 20px 60px rgba(0,0,0,.35); }
        h1 { margin:0 0 8px; font-size:1.6rem; }
        p { color:#b7bbca; line-height:1.6; }
        input { width:100%; box-sizing:border-box; margin-top:14px; padding:12px 14px; border-radius:8px; border:1px solid #4a4f7a; background:#101222; color:#f3f4f6; font-size:1rem; }
        button { margin-top:14px; width:100%; padding:12px 14px; border:none; border-radius:8px; background:#f0a500; color:#111; font-weight:700; cursor:pointer; font-size:1rem; }
        #status { margin-top:12px; font-size:.92rem; color:#ff8b8b; min-height:20px; }
        .hint { margin-top:16px; font-size:.88rem; color:#8f96ad; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Protected Access</h1>
        <p>This app contains private stored charts and readings. Enter the shared password to continue.</p>
        <input id="password" type="password" placeholder="Password" autofocus>
        <button onclick="login()">Enter App</button>
        <div id="status"></div>
        <div class="hint">Session stays active in this browser until you log out.</div>
    </div>

    <script>
    async function login() {
        const password = document.getElementById('password').value;
        const status = document.getElementById('status');
        status.textContent = 'Checking password...';

        try {
            const resp = await fetch('/login', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({password})
            });
            const data = await resp.json();
            if (!resp.ok) throw new Error(data.error || 'Login failed');
            window.location.href = '/dashboard';
        } catch (err) {
            status.textContent = err.message;
        }
    }

    document.getElementById('password').addEventListener('keydown', (e) => {
        if (e.key === 'Enter') login();
    });
    </script>
</body>
</html>
