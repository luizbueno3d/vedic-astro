<!DOCTYPE html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { background: var(--bg-base); padding: 20px; font-family: var(--font-body); }
  .row { display: flex; align-items: center; gap: 12px; margin-bottom: 6px; }
  .bar { background: var(--color-gold-300); border-radius: 2px; height: 12px; }
  .name { font-size: 9px; font-family: var(--font-mono); color: var(--fg-secondary); width: 60px; flex-shrink: 0; }
  .px { font-size: 9px; color: var(--fg-disabled); font-family: var(--font-mono); }
  h5 { font-size: 9px; letter-spacing: 0.10em; text-transform: uppercase; color: var(--fg-secondary); margin-bottom: 10px; font-weight: 600; }
</style></head><body>
<h5>Spacing Scale</h5>
<div class="row"><span class="name">--space-1</span><div class="bar" style="width:4px"></div><span class="px">4px</span></div>
<div class="row"><span class="name">--space-2</span><div class="bar" style="width:8px"></div><span class="px">8px</span></div>
<div class="row"><span class="name">--space-3</span><div class="bar" style="width:12px"></div><span class="px">12px</span></div>
<div class="row"><span class="name">--space-4</span><div class="bar" style="width:16px"></div><span class="px">16px</span></div>
<div class="row"><span class="name">--space-6</span><div class="bar" style="width:24px"></div><span class="px">24px</span></div>
<div class="row"><span class="name">--space-8</span><div class="bar" style="width:32px"></div><span class="px">32px</span></div>
<div class="row"><span class="name">--space-10</span><div class="bar" style="width:40px"></div><span class="px">40px</span></div>
<div class="row"><span class="name">--space-12</span><div class="bar" style="width:48px"></div><span class="px">48px — section-y mobile</span></div>
<div class="row"><span class="name">--space-16</span><div class="bar" style="width:64px"></div><span class="px">64px</span></div>
<div class="row"><span class="name">--space-20</span><div class="bar" style="width:80px"></div><span class="px">80px — section-y tablet</span></div>
<div class="row"><span class="name">--space-24</span><div class="bar" style="width:96px"></div><span class="px">96px — section-y desktop</span></div>
<div class="row"><span class="name">--space-32</span><div class="bar" style="width:128px"></div><span class="px">128px</span></div>
</body></html>
