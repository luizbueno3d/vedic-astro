<!DOCTYPE html>
<html><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&family=DM+Sans:opsz,wght@9..40,400;9..40,500&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: white; padding: 24px; font-family: 'Instrument Sans', sans-serif; -webkit-font-smoothing: antialiased; }
  h5 { font-size: 9px; letter-spacing: 0.10em; text-transform: uppercase; color: #B2B0AC; margin-bottom: 12px; font-weight: 600; font-family: 'DM Sans', sans-serif; }
  .row { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; margin-bottom: 20px; }
  .divider { height: 1px; background: #F0EDE8; margin: 4px 0 20px; }

  /* Primary — Ink */
  .btn-ink {
    display: inline-flex; align-items: center; gap: 8px;
    background: #0E0E0E; color: #FAFAF8;
    font-family: 'Instrument Sans', sans-serif; font-size: 14px; font-weight: 600;
    letter-spacing: -0.01em;
    padding: 13px 28px; border-radius: 4px; border: none; cursor: pointer;
    transition: background 150ms ease;
  }
  .btn-ink:hover { background: #2A2A2A; }

  /* Copper — key CTA */
  .btn-copper {
    display: inline-flex; align-items: center; gap: 8px;
    background: #B8622A; color: #FAFAF8;
    font-family: 'Instrument Sans', sans-serif; font-size: 14px; font-weight: 600;
    letter-spacing: -0.01em;
    padding: 13px 28px; border-radius: 4px; border: none; cursor: pointer;
    transition: background 150ms ease;
  }
  .btn-copper:hover { background: #8C4F30; }

  /* Outline */
  .btn-outline {
    display: inline-flex; align-items: center; gap: 8px;
    background: transparent; color: #0E0E0E;
    font-family: 'Instrument Sans', sans-serif; font-size: 14px; font-weight: 500;
    letter-spacing: -0.01em;
    padding: 12px 26px; border-radius: 4px; border: 1.5px solid #0E0E0E; cursor: pointer;
    transition: all 150ms ease;
  }
  .btn-outline:hover { background: #0E0E0E; color: #FAFAF8; }

  /* Outline light (on dark bg) */
  .btn-outline-light {
    display: inline-flex; align-items: center; gap: 8px;
    background: transparent; color: #FAFAF8;
    font-family: 'Instrument Sans', sans-serif; font-size: 14px; font-weight: 500;
    letter-spacing: -0.01em;
    padding: 12px 26px; border-radius: 4px; border: 1.5px solid rgba(250,250,248,0.35); cursor: pointer;
    transition: all 150ms ease;
  }
  .btn-outline-light:hover { border-color: rgba(250,250,248,0.75); }

  /* Ghost / text link */
  .btn-ghost {
    display: inline-flex; align-items: center; gap: 6px;
    background: transparent; color: #3A3A3A;
    font-family: 'Instrument Sans', sans-serif; font-size: 14px; font-weight: 500;
    border: none; cursor: pointer; padding: 0;
    text-decoration: underline; text-underline-offset: 4px; text-decoration-color: #C8C4BC;
    transition: text-decoration-color 150ms ease, color 150ms ease;
  }
  .btn-ghost:hover { color: #0E0E0E; text-decoration-color: #0E0E0E; }

  /* Small */
  .btn-sm {
    font-size: 12px; padding: 9px 18px; font-weight: 600; letter-spacing: 0;
  }

  .dark-row { background: #0E0E0E; padding: 20px; border-radius: 8px; display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
</style></head><body>

<h5>Primary</h5>
<div class="row">
  <button class="btn-ink">Start Your Reading</button>
  <button class="btn-copper">Get Your Life Map</button>
  <button class="btn-ink btn-sm">Get Started</button>
</div>
<div class="divider"></div>

<h5>Secondary</h5>
<div class="row">
  <button class="btn-outline">Learn More</button>
  <button class="btn-outline btn-sm">See Details</button>
  <button class="btn-ghost">See what's included →</button>
</div>
<div class="divider"></div>

<h5>On Dark</h5>
<div class="dark-row">
  <button class="btn-copper">Start Your Reading</button>
  <button class="btn-outline-light">Learn More</button>
  <button class="btn-ghost" style="color:rgba(250,250,248,0.55); text-decoration-color:rgba(250,250,248,0.20)">See what's included →</button>
</div>

</body></html>
