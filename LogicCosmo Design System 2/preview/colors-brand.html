<!DOCTYPE html>
<html><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&family=DM+Mono:wght@400&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: white; padding: 20px; font-family: 'DM Sans', sans-serif; -webkit-font-smoothing: antialiased; }
  .row { display: flex; gap: 6px; margin-bottom: 6px; }
  .col { flex: 1; }
  .swatch { height: 60px; border-radius: 6px; }
  .name { font-size: 10px; color: #8A8785; margin-top: 5px; font-weight: 500; }
  .val  { font-size: 9px; color: #B2B0AC; font-family: 'DM Mono', monospace; margin-top: 1px; }
  h5 { font-size: 9px; letter-spacing: 0.10em; text-transform: uppercase; color: #B2B0AC; margin-bottom: 8px; font-weight: 600; }
  .divider { height: 1px; background: #F0EDE8; margin: 12px 0; }
</style></head><body>

<h5>Ink Scale</h5>
<div class="row">
  <div class="col"><div class="swatch" style="background:#0E0E0E"></div><div class="name">Ink</div><div class="val">#0E0E0E</div></div>
  <div class="col"><div class="swatch" style="background:#1E1E1E"></div><div class="name">Charcoal</div><div class="val">#1E1E1E</div></div>
  <div class="col"><div class="swatch" style="background:#3A3A3A"></div><div class="name">Dark</div><div class="val">#3A3A3A</div></div>
  <div class="col"><div class="swatch" style="background:#5C5958"></div><div class="name">Mid</div><div class="val">#5C5958</div></div>
  <div class="col"><div class="swatch" style="background:#8A8785"></div><div class="name">Muted</div><div class="val">#8A8785</div></div>
  <div class="col"><div class="swatch" style="background:#B2B0AC"></div><div class="name">Soft</div><div class="val">#B2B0AC</div></div>
</div>

<div class="divider"></div>

<h5>Paper Scale</h5>
<div class="row">
  <div class="col"><div class="swatch" style="background:#C8C4BC; border:1px solid #E8E4DE"></div><div class="name">Stone</div><div class="val">#C8C4BC</div></div>
  <div class="col"><div class="swatch" style="background:#E2DED8; border:1px solid #E8E4DE"></div><div class="name">Border</div><div class="val">#E2DED8</div></div>
  <div class="col"><div class="swatch" style="background:#EDEAE4; border:1px solid #E8E4DE"></div><div class="name">Surface</div><div class="val">#EDEAE4</div></div>
  <div class="col"><div class="swatch" style="background:#F5F2EC; border:1px solid #E8E4DE"></div><div class="name">Paper ★</div><div class="val">#F5F2EC</div></div>
  <div class="col"><div class="swatch" style="background:#FAFAF8; border:1px solid #E8E4DE"></div><div class="name">White</div><div class="val">#FAFAF8</div></div>
</div>

<div class="divider"></div>

<h5>Accent — Copper (single)</h5>
<div class="row">
  <div class="col"><div class="swatch" style="background:#5C3420"></div><div class="name">Deep</div><div class="val">#5C3420</div></div>
  <div class="col"><div class="swatch" style="background:#8C4F30"></div><div class="name">Dark</div><div class="val">#8C4F30</div></div>
  <div class="col"><div class="swatch" style="background:#B8622A"></div><div class="name">Copper ★</div><div class="val">#B8622A</div></div>
  <div class="col"><div class="swatch" style="background:#CC7E4A"></div><div class="name">Mid</div><div class="val">#CC7E4A</div></div>
  <div class="col"><div class="swatch" style="background:#E0A882; border:1px solid #E8E4DE"></div><div class="name">Light</div><div class="val">#E0A882</div></div>
  <div class="col"><div class="swatch" style="background:#F5E6D8; border:1px solid #E8E4DE"></div><div class="name">Tint</div><div class="val">#F5E6D8</div></div>
</div>

</body></html>
