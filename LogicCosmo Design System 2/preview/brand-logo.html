<!DOCTYPE html>
<html><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #F5F2EC; padding: 24px; font-family: 'Instrument Sans', sans-serif; -webkit-font-smoothing: antialiased; display: flex; gap: 24px; flex-wrap: wrap; align-items: flex-start; }
  h5 { font-size: 9px; letter-spacing: 0.10em; text-transform: uppercase; color: #8A8785; margin-bottom: 12px; font-weight: 600; }
  .col { display: flex; flex-direction: column; gap: 6px; }

  .logo-wrap { display: flex; flex-direction: column; gap: 3px; }
  .wordmark { font-family: 'Instrument Sans', sans-serif; letter-spacing: -0.04em; line-height: 1; }
  .wordmark strong { font-weight: 700; }
  .wordmark span { font-weight: 300; }
  .sub { font-family: 'Instrument Sans', sans-serif; font-size: 9px; font-weight: 400; letter-spacing: 0.14em; text-transform: uppercase; }

  /* Mark: minimal geometric — circle + centered cross-hair */
  .mark svg { display: block; }

  .on-light { background: white; padding: 20px 24px; border-radius: 4px; border: 1px solid #E2DED8; }
  .on-dark  { background: #0E0E0E; padding: 20px 24px; border-radius: 4px; }
  .on-paper { background: #F5F2EC; padding: 20px 24px; border-radius: 4px; border: 1px solid #E2DED8; }
</style></head><body>

<div class="col">
  <h5>On White</h5>
  <div class="on-light">
    <div style="display:flex; align-items:center; gap:10px">
      <!-- Mark: thin circle + dot -->
      <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
        <circle cx="14" cy="14" r="12" stroke="#0E0E0E" stroke-width="1.25"/>
        <circle cx="14" cy="14" r="2.5" fill="#B8622A"/>
        <line x1="14" y1="2" x2="14" y2="26" stroke="#0E0E0E" stroke-width="0.75" opacity="0.2"/>
        <line x1="2" y1="14" x2="26" y2="14" stroke="#0E0E0E" stroke-width="0.75" opacity="0.2"/>
      </svg>
      <div class="logo-wrap">
        <div class="wordmark" style="font-size:20px; color:#0E0E0E; font-weight:700; letter-spacing:-0.04em">Logicosmo</div>
        <div class="sub" style="color:#8A8785">Life Path Reading</div>
      </div>
    </div>
  </div>
</div>

<div class="col">
  <h5>On Dark</h5>
  <div class="on-dark">
    <div style="display:flex; align-items:center; gap:10px">
      <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
        <circle cx="14" cy="14" r="12" stroke="#FAFAF8" stroke-width="1.25" opacity="0.6"/>
        <circle cx="14" cy="14" r="2.5" fill="#B8622A"/>
        <line x1="14" y1="2" x2="14" y2="26" stroke="#FAFAF8" stroke-width="0.75" opacity="0.15"/>
        <line x1="2" y1="14" x2="26" y2="14" stroke="#FAFAF8" stroke-width="0.75" opacity="0.15"/>
      </svg>
      <div class="logo-wrap">
        <div class="wordmark" style="font-size:20px; color:#FAFAF8; font-weight:700; letter-spacing:-0.04em">Logicosmo</div>
        <div class="sub" style="color:rgba(250,250,248,0.35)">Life Path Reading</div>
      </div>
    </div>
  </div>
</div>

<div class="col">
  <h5>Mark Only</h5>
  <div class="on-paper" style="display:flex; gap:16px; align-items:center">
    <svg width="40" height="40" viewBox="0 0 28 28" fill="none">
      <circle cx="14" cy="14" r="12" stroke="#0E0E0E" stroke-width="1.25"/>
      <circle cx="14" cy="14" r="2.5" fill="#B8622A"/>
      <line x1="14" y1="2" x2="14" y2="26" stroke="#0E0E0E" stroke-width="0.75" opacity="0.2"/>
      <line x1="2" y1="14" x2="26" y2="14" stroke="#0E0E0E" stroke-width="0.75" opacity="0.2"/>
    </svg>
    <svg width="24" height="24" viewBox="0 0 28 28" fill="none">
      <circle cx="14" cy="14" r="12" stroke="#0E0E0E" stroke-width="1.25"/>
      <circle cx="14" cy="14" r="2.5" fill="#B8622A"/>
      <line x1="14" y1="2" x2="14" y2="26" stroke="#0E0E0E" stroke-width="0.75" opacity="0.2"/>
      <line x1="2" y1="14" x2="26" y2="14" stroke="#0E0E0E" stroke-width="0.75" opacity="0.2"/>
    </svg>
    <svg width="16" height="16" viewBox="0 0 28 28" fill="none">
      <circle cx="14" cy="14" r="12" stroke="#0E0E0E" stroke-width="1.5"/>
      <circle cx="14" cy="14" r="2.5" fill="#B8622A"/>
    </svg>
  </div>
</div>

</body></html>
