<!DOCTYPE html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { background: var(--bg-base); padding: 20px; font-family: var(--font-body); }
  .row { display: flex; gap: 8px; margin-bottom: 8px; }
  .col { flex: 1; }
  .swatch { height: 56px; border-radius: 8px; }
  .label { font-size: 10px; color: var(--fg-secondary); margin-top: 4px; }
  .val { font-size: 9px; color: var(--fg-disabled); font-family: var(--font-mono); }
  h5 { font-size: 9px; letter-spacing: 0.10em; text-transform: uppercase; color: var(--fg-secondary); margin-bottom: 8px; font-weight: 600; }
</style></head><body>
<h5>Cream &amp; Sage Neutrals</h5>
<div class="row">
  <div class="col"><div class="swatch" style="background:#FDFBF7; border:1px solid #EAE2D5"></div><div class="label">Cream 50</div><div class="val">#FDFBF7</div></div>
  <div class="col"><div class="swatch" style="background:#FAF7F2; border:1px solid #EAE2D5"></div><div class="label">Cream 100 ★</div><div class="val">#FAF7F2</div></div>
  <div class="col"><div class="swatch" style="background:#F3EFE8; border:1px solid #EAE2D5"></div><div class="label">Cream 200</div><div class="val">#F3EFE8</div></div>
  <div class="col"><div class="swatch" style="background:#EAE2D5"></div><div class="label">Cream 300</div><div class="val">#EAE2D5</div></div>
  <div class="col"><div class="swatch" style="background:#DDD1BF"></div><div class="label">Cream 400</div><div class="val">#DDD1BF</div></div>
  <div class="col"><div class="swatch" style="background:#C8B89E"></div><div class="label">Cream 500</div><div class="val">#C8B89E</div></div>
</div>
<div class="row">
  <div class="col"><div class="swatch" style="background:#4A5C50"></div><div class="label">Sage 700</div><div class="val">#4A5C50</div></div>
  <div class="col"><div class="swatch" style="background:#5E7265"></div><div class="label">Sage 600</div><div class="val">#5E7265</div></div>
  <div class="col"><div class="swatch" style="background:#7A8C7E"></div><div class="label">Sage 500 ★</div><div class="val">#7A8C7E</div></div>
  <div class="col"><div class="swatch" style="background:#9EB0A3"></div><div class="label">Sage 400</div><div class="val">#9EB0A3</div></div>
  <div class="col"><div class="swatch" style="background:#C0CECC"></div><div class="label">Sage 300</div><div class="val">#C0CECC</div></div>
  <div class="col"><div class="swatch" style="background:#EEF3F1; border:1px solid #DDE6E3"></div><div class="label">Sage 100</div><div class="val">#EEF3F1</div></div>
</div>
</body></html>
