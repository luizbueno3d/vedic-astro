<!DOCTYPE html>
<html><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&family=DM+Mono:wght@400&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #F5F2EC; font-family: 'Instrument Sans', sans-serif; -webkit-font-smoothing: antialiased; padding: 0; }
  h5 { font-size: 9px; letter-spacing: 0.10em; text-transform: uppercase; color: #8A8785; font-weight: 600; padding: 14px 20px 8px; font-family: 'Instrument Sans', sans-serif; }

  nav {
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 28px; height: 56px;
  }

  .nav-logo { display: flex; align-items: center; gap: 9px; text-decoration: none; }
  .nav-wordmark { font-family: 'Instrument Sans', sans-serif; font-size: 16px; letter-spacing: -0.035em; line-height: 1; }
  .nav-wordmark strong { font-weight: 700; }
  .nav-wordmark span { font-weight: 300; }

  .nav-links { display: flex; gap: 28px; list-style: none; }
  .nav-links a { font-family: 'Instrument Sans', sans-serif; font-size: 13px; font-weight: 500; text-decoration: none; letter-spacing: -0.01em; transition: opacity 150ms ease; }
  .nav-links a:hover { opacity: 0.6; }

  .nav-cta {
    font-family: 'Instrument Sans', sans-serif; font-size: 13px; font-weight: 600;
    letter-spacing: -0.01em;
    padding: 8px 18px; border-radius: 4px; border: none; cursor: pointer;
    transition: background 150ms ease;
  }

  /* Light nav */
  .nav-light { background: white; border-bottom: 1px solid #E2DED8; }
  .nav-light .nav-wordmark { color: #0E0E0E; }
  .nav-light .nav-links a { color: #3A3A3A; }
  .nav-light .nav-cta { background: #0E0E0E; color: #FAFAF8; }
  .nav-light .nav-cta:hover { background: #2A2A2A; }

  /* Dark nav */
  .nav-dark { background: #0E0E0E; border-bottom: 1px solid rgba(255,255,255,0.07); }
  .nav-dark .nav-wordmark { color: #FAFAF8; }
  .nav-dark .nav-links a { color: rgba(250,250,248,0.60); }
  .nav-dark .nav-cta { background: #B8622A; color: #FAFAF8; }
  .nav-dark .nav-cta:hover { background: #8C4F30; }

  /* Transparent / hero state */
  .nav-transparent { background: transparent; border-bottom: none; }
  .nav-transparent .nav-wordmark { color: #FAFAF8; }
  .nav-transparent .nav-links a { color: rgba(250,250,248,0.55); }
  .nav-transparent .nav-cta { background: transparent; color: #FAFAF8; border: 1px solid rgba(250,250,248,0.30); }
  .nav-transparent .nav-cta:hover { background: rgba(255,255,255,0.08); }

  .mark-circle { flex-shrink: 0; }
</style></head><body>

<h5>Light — scrolled</h5>
<nav class="nav-light">
  <a class="nav-logo" href="#">
    <svg class="mark-circle" width="22" height="22" viewBox="0 0 28 28" fill="none">
      <circle cx="14" cy="14" r="12" stroke="#0E0E0E" stroke-width="1.25"/>
      <circle cx="14" cy="14" r="2.5" fill="#B8622A"/>
      <line x1="14" y1="2" x2="14" y2="26" stroke="#0E0E0E" stroke-width="0.75" opacity="0.2"/>
      <line x1="2" y1="14" x2="26" y2="14" stroke="#0E0E0E" stroke-width="0.75" opacity="0.2"/>
    </svg>
    <span class="nav-wordmark"><strong>Logic</strong><span>Cosmo</span></span>
  </a>
  <ul class="nav-links">
    <li><a href="#">How It Works</a></li>
    <li><a href="#">Readings</a></li>
    <li><a href="#">FAQ</a></li>
  </ul>
  <button class="nav-cta">Start Your Reading</button>
</nav>

<h5>Dark — on ink background</h5>
<nav class="nav-dark">
  <a class="nav-logo" href="#">
    <svg class="mark-circle" width="22" height="22" viewBox="0 0 28 28" fill="none">
      <circle cx="14" cy="14" r="12" stroke="#FAFAF8" stroke-width="1.25" opacity="0.55"/>
      <circle cx="14" cy="14" r="2.5" fill="#B8622A"/>
      <line x1="14" y1="2" x2="14" y2="26" stroke="#FAFAF8" stroke-width="0.75" opacity="0.12"/>
      <line x1="2" y1="14" x2="26" y2="14" stroke="#FAFAF8" stroke-width="0.75" opacity="0.12"/>
    </svg>
    <span class="nav-wordmark"><strong>Logic</strong><span>Cosmo</span></span>
  </a>
  <ul class="nav-links">
    <li><a href="#">How It Works</a></li>
    <li><a href="#">Readings</a></li>
    <li><a href="#">FAQ</a></li>
  </ul>
  <button class="nav-cta">Start Your Reading</button>
</nav>

<h5>Transparent — hero top</h5>
<div style="background:#1E1E1E">
<nav class="nav-transparent">
  <a class="nav-logo" href="#">
    <svg class="mark-circle" width="22" height="22" viewBox="0 0 28 28" fill="none">
      <circle cx="14" cy="14" r="12" stroke="#FAFAF8" stroke-width="1.25" opacity="0.45"/>
      <circle cx="14" cy="14" r="2.5" fill="#B8622A"/>
      <line x1="14" y1="2" x2="14" y2="26" stroke="#FAFAF8" stroke-width="0.75" opacity="0.10"/>
      <line x1="2" y1="14" x2="26" y2="14" stroke="#FAFAF8" stroke-width="0.75" opacity="0.10"/>
    </svg>
    <span class="nav-wordmark"><strong>Logic</strong><span>Cosmo</span></span>
  </a>
  <ul class="nav-links">
    <li><a href="#">How It Works</a></li>
    <li><a href="#">Readings</a></li>
    <li><a href="#">FAQ</a></li>
  </ul>
  <button class="nav-cta">Start Your Reading</button>
</nav>
</div>

</body></html>
